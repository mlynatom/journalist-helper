name: Run Journalist Helper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: read

jobs:
  run:
    name: Execute app and publish output
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run application and capture output
        id: run_app
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TRIAGE_OUTPUT_FILE: triage_result.txt
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        shell: bash
        run: |
          uv run python main.py
          
      - name: Write run summary from step output
        shell: bash
        run: |
          cat triage_result.txt >> "$GITHUB_STEP_SUMMARY"
